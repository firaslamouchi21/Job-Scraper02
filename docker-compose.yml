services:
  agent-ui:
    image: ghcr.io/firaslamouchi21/job-scraper02/ui:latest
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      - DATA_DIR=/data
      - CONFIG_DIR=/config
      - SCRAPER_URL=http://scraper:8000
    volumes:
      - ./data:/data
      - ./config:/config
    depends_on:
      - scraper

  scraper:
    image: ghcr.io/firaslamouchi21/job-scraper02/scraper:latest
    build:
      context: .
      dockerfile: Dockerfile.scraper
    ports:
      - "8000:8000"
    environment:
      - DATA_DIR=/data
      - CONFIG_DIR=/config
    volumes:
      - ./data:/data
      - ./config:/config

  automation-engine-init:
    image: alpine:3.19
    command: >
      sh -c "
        mkdir -p /home/node/.n8n &&
        chown -R 1000:1000 /home/node/.n8n
      "
    volumes:
      - ./data/n8n:/home/node/.n8n

  automation-engine:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      - automation-engine-init
